<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NomadSpeak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header class="header">
      <div class="header-main">
        <div class="brand">
          <div class="logo-dot"></div>
          <div>
            <h1 class="logo">
              <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 2a7 7 0 0 0-7 7c0 4.55 4.68 9.92 6.24 11.58a1 1 0 0 0 1.52 0C14.32 18.92 19 13.55 19 9a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/>
                <path d="M20.5 16.5c0 2.22-2.46 4-5.5 4h-2.44l-2.73 1.97a.5.5 0 0 1-.79-.4v-1.57C6.7 20.05 5 18.43 5 16.5"/>
              </svg>
              NomadSpeak
            </h1>
            <p class="subtitle">English Learning Quiz</p>
          </div>
        </div>

        <div class="header-nav" aria-label="Үндсэн навигаци">
          <button class="secondary nav-btn" id="nav-start-btn" type="button">Старт</button>
          <button class="secondary nav-btn" id="nav-stats-btn" type="button">Статистик</button>
        </div>
      </div>

      <div class="topbar hidden" id="topbar">
        <div class="pill">Түвшин: <span id="level-label">Анхан</span></div>
        <div class="pill">Оноо: <span id="score">0</span></div>
        <div class="pill">Асуулт: <span id="progress">0/0</span></div>
      </div>
    </header>

    <!-- START SCREEN -->
    <section class="card" id="start-screen">
      <h2>Эхлэхээс өмнө</h2>
      <p class="muted">Түвшин сонгоод “Эхлэх” дар.</p>

      <div class="level-row" id="level-row">
        <button class="level-btn active" data-level="beginner">Анхан</button>
        <button class="level-btn" data-level="intermediate">Дунд</button>
        <button class="level-btn" data-level="advanced">Дээд</button>
      </div>

      <button class="primary" id="start-btn">Эхлэх</button>
    </section>

    <!-- QUIZ SCREEN -->
    <section class="card hidden" id="quiz-screen">
      <h2 class="question" id="question">Асуулт</h2>

      <div class="options" id="options"></div>

      <div class="result hidden" id="result"></div>

      <div class="actions">
        <button class="secondary hidden" id="next-btn">Дараагийн асуулт</button>
      </div>
    </section>

    <!-- STATS SCREEN -->
    <section class="card hidden" id="stats-screen">
      <h2>Статистик</h2>
      <p class="muted">Өдрийн ахиц болон үр дүн энд харагдана.</p>
    </section>

    <!-- END SCREEN -->
    <section class="card hidden" id="end-screen">
      <h2>Дууслаа 🎉</h2>
      <p class="muted" id="final-text">Таны оноо: 0</p>

      <div class="end-actions">
        <button class="primary" id="restart-btn">Дахин эхлэх</button>
        <button class="secondary" id="back-btn">Буцаад түвшин сонгох</button>
      </div>
    </section>

    <footer class="footer">
      <span class="muted">© NomadSpeak</span>
    </footer>
  </div>

  <div class="confirm-overlay hidden" id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="confirm-card">
      <h2 id="confirm-title">Одоогийн дасгал үргэлжилж байна. Гарах уу?</h2>
      <div class="confirm-actions">
        <button class="primary" id="confirm-yes-btn" type="button">Тийм, гаръя</button>
        <button class="secondary" id="confirm-no-btn" type="button">Үгүй</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
