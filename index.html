<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NomadSpeak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header class="header">
      <div class="header-main">
        <div class="brand">
          <div>
            <h1 class="logo">
              <svg class="logo-mark" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <defs>
                  <radialGradient id="globe-core" cx="30%" cy="26%" r="75%">
                    <stop offset="0%" stop-color="#8effff" />
                    <stop offset="58%" stop-color="#2ad8f8" />
                    <stop offset="100%" stop-color="#0a7cc4" />
                  </radialGradient>
                  <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff8b4" />
                    <stop offset="100%" stop-color="#6dffe3" />
                  </linearGradient>
                </defs>
                <circle cx="32" cy="32" r="24" fill="url(#globe-core)" stroke="url(#ring)" stroke-width="2.5" />
                <ellipse cx="32" cy="32" rx="20" ry="7.4" fill="none" stroke="#c9ffff" stroke-width="1.6" opacity="0.88" />
                <ellipse cx="32" cy="32" rx="12" ry="24" fill="none" stroke="#d6ffff" stroke-width="1.5" opacity="0.84" />
                <path d="M8 32h48M32 8v48" stroke="#f3ffff" stroke-width="1.5" opacity="0.66" />
                <text x="32" y="36" text-anchor="middle" font-size="10.5" font-family="Arial, sans-serif" font-weight="700" fill="#08395f">Монгол</text>
              </svg>
              NomadSpeak
            </h1>
            <p class="subtitle">English Learning Quiz</p>
          </div>
        </div>

        <div class="header-nav" aria-label="Үндсэн навигаци">
          <button class="secondary nav-btn" id="nav-home-btn" type="button">Эхлэл</button>
          <button class="secondary nav-btn" id="nav-sentences-btn" type="button">Өгүүлбэрүүд</button>
          <button class="secondary nav-btn" id="nav-stats-btn" type="button">Статистик</button>
        </div>
      </div>

      <div class="topbar hidden" id="topbar">
        <div class="pill">Түвшин: <span id="level-label">Анхан</span></div>
        <div class="pill">Оноо: <span id="score">0</span></div>
        <div class="pill">Асуулт: <span id="progress">0/0</span></div>
      </div>
    </header>

    <!-- START SCREEN -->
    <section class="card" id="start-screen">
      <h2>Эхлэхээс өмнө</h2>
      <p class="muted">Түвшин сонгоод “Эхлэх” дар.</p>

      <div class="level-row" id="level-row">
        <button class="level-btn active" data-level="beginner">Анхан</button>
        <button class="level-btn" data-level="intermediate">Дунд</button>
        <button class="level-btn" data-level="advanced">Дээд</button>
      </div>

      <button class="primary" id="start-btn">Эхлэх</button>
    </section>

    <!-- QUIZ SCREEN -->
    <section class="card hidden" id="quiz-screen">
      <h2 class="question" id="question">Асуулт</h2>

      <div class="options" id="options"></div>

      <div class="result hidden" id="result"></div>

      <div class="actions">
        <button class="secondary hidden" id="next-btn">Дараагийн асуулт</button>
      </div>
    </section>

    <!-- STATS SCREEN -->
    <section class="card hidden" id="stats-screen">
      <h2>Статистик</h2>
      <p class="muted">Өдрийн ахиц болон үр дүн энд харагдана.</p>
    </section>

    <!-- END SCREEN -->
    <section class="card hidden" id="end-screen">
      <h2>Дууслаа 🎉</h2>
      <p class="muted" id="final-text">Таны оноо: 0</p>

      <div class="end-actions">
        <button class="primary" id="restart-btn">Дахин эхлэх</button>
        <button class="secondary" id="back-btn">Буцаад түвшин сонгох</button>
      </div>
    </section>

    <footer class="footer">
      <span class="muted">© NomadSpeak</span>
    </footer>
  </div>

  <div class="confirm-overlay hidden" id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="confirm-card">
      <h2 id="confirm-title">Одоогийн дасгал үргэлжилж байна. Гарах уу?</h2>
      <div class="confirm-actions">
        <button class="primary" id="confirm-yes-btn" type="button">Тийм, гаръя</button>
        <button class="secondary" id="confirm-no-btn" type="button">Үгүй</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
